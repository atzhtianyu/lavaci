metadata:
  name: mdtest
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  PROCESS: 4
  DIRECTORY_DEPTH: 4
  BRANCH: 2
  FILE: 200
  ITERATION: 5
run:
  steps:
    - cd lava-testcases/performance-test/mdtest
    - bash mdtest.sh -p "${PROCESS}" -d "${DIRECTORY_DEPTH}" -b "${BRANCH}" -f "${FILE}" -i "${ITERATION}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt