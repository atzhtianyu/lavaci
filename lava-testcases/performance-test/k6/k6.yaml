metadata:
  name: k6
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  VUS: 50
  DURATION: "60s"
  TARGET_URL: "http://10.30.190.110:80"
run:
  steps:
    - cd lava-testcases/performance-test/k6
    - bash k6.sh -u "${VUS}" -d "${DURATION}" -e "${TARGET_URL}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt