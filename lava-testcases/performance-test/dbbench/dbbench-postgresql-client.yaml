metadata:
  name: dbbench-postgresql-client
  format: "Lava-Test Test Definition 1.0"
  description: "Run fio on RISC-V device"
  maintainer:
    - wujie22@iscas.ac.cn
  os:
    - openEuler-riscv64
  scope:
      - performance
  devices:
    - qemu
    - lpi4a
    - sg2042
    - spacemit-k1-bananapi-f3
params:
  THREADS: 20
  CONNS: 16
  ITERATIONS: 10000
run:
  steps:
    - cd lava-testcases/performance-test/dbbench
    - bash dbbench-postgresql-client.sh -t "${THREADS}" -c "${CONNS}" -i "${ITERATIONS}"
    - chmod +x ../../utils/send-to-lava.sh
    - ../../utils/send-to-lava.sh ./output/result.txt